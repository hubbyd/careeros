version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: careeros-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: careeros-backend
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/prisma/prod.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - LOG_LEVEL=info
    volumes:
      - backend_data:/app/prisma

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: careeros-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  redis_data:
  backend_data:
