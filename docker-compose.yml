version: '3.8'

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: file:/app/data/dev.db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - server_data:/app/data
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - server
    command: npm run dev

volumes:
  redis_data:
  server_data: