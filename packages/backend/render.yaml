services:
  - type: web
    name: careeros-backend
    env: node
    plan: starter
    region: singapore
    buildCommand: npm install && npm run build -w packages/backend && npx prisma migrate deploy --schema packages/backend/prisma/schema.prisma
    startCommand: npm run start:prod -w packages/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: careeros-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        fromService:
          type: redis
          name: careeros-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE_URL
        value: https://api.openai.com/v1
      - key: LOG_LEVEL
        value: info

databases:
  - name: careeros-db
    databaseName: careeros
    user: admin
    plan: starter
    region: singapore

redis:
  - name: careeros-redis
    plan: starter
    region: singapore
