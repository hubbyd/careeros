name = "careeros-web"
compatibility_date = "2024-01-01"

[build]
command = "cd packages/web && npm install && npm run build"
publish = "packages/web/dist"

[env.production]
node_compat = true

[[redirects]]
source = "/api/*"
destination = "https://careeros-backend.onrender.com/api/:splat"
status = 200

[[redirects]]
source = "/*"
destination = "/index.html"
status = 200

[headers]
  [headers."/*"]
    "X-Frame-Options" = "DENY"
    "X-Content-Type-Options" = "nosniff"
    "Strict-Transport-Security" = "max-age=31536000; includeSubDomains"
    "Content-Security-Policy" = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://careeros-backend.onrender.com"

  [headers."/*.{js,css,png,jpg,jpeg,gif,ico,svg,woff,woff2,ttf,eot}"]
    "Cache-Control" = "public, immutable, max-age=31536000"
