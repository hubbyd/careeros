name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npm run build
        working-directory: server

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:staging
          build-args: |
            NODE_ENV=staging

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/server:staging

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/frontend:staging
            docker pull ghcr.io/${{ github.repository }}/server:staging
            docker-compose -f docker-compose.prod.yml up -d --force-recreate

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            NODE_ENV=production

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/server:latest

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/frontend:latest
            docker pull ghcr.io/${{ github.repository }}/server:latest
            docker-compose -f docker-compose.prod.yml up -d --force-recreate