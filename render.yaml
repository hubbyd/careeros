services:
  # Web Service - 后端 API + 前端静态文件
  - type: web
    name: jobsprint
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: |
      cd .. && npm install && npm run build
      npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jobsprint-db
          property: connectionString

databases:
  # PostgreSQL 数据库
  - name: jobsprint-db
    databaseName: jobsprint
    user: jobsprint
    plan: free
