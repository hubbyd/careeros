services:
  - type: web
    name: jobsprint
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      npm ci
      npm run build
      cd server && npm ci && npm run build
    startCommand: cd server && npx prisma migrate deploy && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: ""